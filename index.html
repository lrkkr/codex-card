<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111317" />
    <title>Codex Card</title>
  </head>
  <body>
    <main id="card">
      <header class="header" data-tauri-drag-region>
        <div class="identity" data-tauri-drag-region>
          <span class="status-dot" id="status-dot" aria-hidden="true"></span>
          <div data-tauri-drag-region>
            <p class="eyebrow" data-tauri-drag-region>Codex usage</p>
            <h1 id="plan-name" data-tauri-drag-region>Loading...</h1>
          </div>
        </div>
        <div class="actions">
          <button id="refresh-button" type="button" aria-label="Refresh usage" title="Refresh usage">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.34-5.66L20 8.68M20 4v4.68h-4.68" />
            </svg>
          </button>
          <button id="close-button" type="button" aria-label="Close Codex Card" title="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          </button>
        </div>
      </header>

      <section class="metrics" aria-live="polite">
        <article class="metric">
          <div class="metric-label">
            <span>Session</span>
            <strong id="session-text">--%</strong>
          </div>
          <div class="progress-track" role="progressbar" aria-label="Session usage" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="session-bar" class="progress-fill"></div>
          </div>
          <p>5-hour limit</p>
        </article>

        <article class="metric">
          <div class="metric-label">
            <span>Weekly</span>
            <strong id="weekly-text">--%</strong>
          </div>
          <div class="progress-track" role="progressbar" aria-label="Weekly usage" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="weekly-bar" class="progress-fill"></div>
          </div>
          <p>7-day limit</p>
        </article>
      </section>

      <footer id="message">Connecting to Codex...</footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
