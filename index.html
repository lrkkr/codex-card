<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#111317" />
    <title>Codex Card</title>
  </head>
  <body>
    <main id="card">
      <header class="header" data-tauri-drag-region>
        <div class="identity" data-tauri-drag-region>
          <span class="status-dot" id="status-dot" aria-hidden="true"></span>
          <h1 id="plan-name" data-tauri-drag-region>Loading...</h1>
        </div>
        <div class="actions">
          <button id="theme-button" type="button" aria-label="Switch to light theme" title="Switch to light theme">
            <svg class="theme-icon theme-icon-sun" viewBox="0 0 24 24" aria-hidden="true">
              <circle cx="12" cy="12" r="4" />
              <path d="M12 2v2M12 20v2M4.93 4.93l1.42 1.42M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.42-1.42M17.66 6.34l1.41-1.41" />
            </svg>
            <svg class="theme-icon theme-icon-moon" viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20.5 14.2A8.5 8.5 0 0 1 9.8 3.5 8.5 8.5 0 1 0 20.5 14.2Z" />
            </svg>
          </button>
          <button id="pin-button" type="button" aria-label="Disable always on top" title="Disable always on top" aria-pressed="true">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m14 4 6 6-3 1-4 4-1 5-3-3-4 4-2-2 4-4-3-3 5-1 4-4 1-3Z" />
            </svg>
          </button>
          <button id="refresh-button" type="button" aria-label="Refresh usage" title="Refresh usage">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M20 12a8 8 0 1 1-2.34-5.66L20 8.68M20 4v4.68h-4.68" />
            </svg>
          </button>
          <button id="close-button" type="button" aria-label="Close Codex Card" title="Close">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="m6 6 12 12M18 6 6 18" />
            </svg>
          </button>
        </div>
      </header>

      <section class="metrics" aria-live="polite">
        <article class="metric">
          <div class="metric-label">
            <span>Session</span>
            <strong id="session-text">--%</strong>
          </div>
          <div class="progress-track" role="progressbar" aria-label="Session usage" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="session-bar" class="progress-fill"></div>
          </div>
        </article>

        <article class="metric">
          <div class="metric-label">
            <span>Weekly</span>
            <strong id="weekly-text">--%</strong>
          </div>
          <div class="progress-track" role="progressbar" aria-label="Weekly usage" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">
            <div id="weekly-bar" class="progress-fill"></div>
          </div>
        </article>
      </section>

      <footer id="message">Connecting to Codex...</footer>
    </main>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
